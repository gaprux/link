<script>
function goShopee() {
  var link = "https://s.shopee.co.id/1gEw8MpO1b";
  var intent = "intent://s.shopee.co.id/1gEw8MpO1b#Intent;package=com.shopee.id;scheme=https;end";

  if (/android/i.test(navigator.userAgent)) {
    window.location.href = intent;
    setTimeout(() => window.location.href = link, 1200);
  } else {
    window.location.href = link;
  }
}

// Notifikasi real-time (simulasi umum, bukan klaim spesifik)
const names = ["Rina", "Budi", "Sari", "Andi", "Dewi", "Fajar", "Wulan", "Desi", "Ali", "Rizky", "Mira", "Hendra", "Siti", "Agus", "Nina", "Yudi"];

function showNotif() {
  let name = names[Math.floor(Math.random()*names.length)];
  let city = cities[Math.floor(Math.random()*cities.length)];
  let notif = document.getElementById("notif");

  notif.innerHTML = `🛒 ${name} dari ${city} sedang melihat produk ini`;
  notif.style.display = "block";

  setTimeout(() => notif.style.display = "none", 3000);
}

setInterval(showNotif, 5000);
</script>
