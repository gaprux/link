<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Promo Produk</title>

<script>
function goShopee() {
  var link = "https://s.shopee.co.id/9paJbBg7xa";
  var intent = "intent://s.shopee.co.id/9paJbBg7xa#Intent;package=com.shopee.id;scheme=https;end";

  if (/android/i.test(navigator.userAgent)) {
    window.location.href = intent;
    setTimeout(function() {
      window.location.href = link;
    }, 1200);
  } else {
    window.location.href = link;
  }
}
</script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
  text-align: center;
}

.container {
  background: white;
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

img {
  width: 100%;
  border-radius: 10px;
}

h2 {
  margin: 10px 0;
}

.price {
  color: red;
  font-size: 22px;
  font-weight: bold;
}

.old {
  text-decoration: line-through;
  color: gray;
  font-size: 14px;
}

.btn {
  display: block;
  margin-top: 20px;
  padding: 15px;
  background: orange;
  color: white;
  font-size: 18px;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <img src="https://via.placeholder.com/400x400" alt="produk">

  <h2>Nama Produk Viral 🔥</h2>

  <div class="old">Rp 99.000</div>
  <div class="price">Rp 36.900</div>

  <p>✔️ Sudah terjual 10.000+<br>
     ✔️ Banyak review bagus ⭐⭐⭐⭐⭐</p>

  <a class="btn" href="#" onclick="goShopee()">
    🛒 Beli Sekarang di Shopee
  </a>

  <p style="font-size:12px; color:gray;">
    *Klik tombol jika tidak otomatis masuk aplikasi
  </p>
</div>

</body>
</html>
